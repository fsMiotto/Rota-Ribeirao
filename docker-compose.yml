version: '3.8'

services:
  places-api:
    build: ./places-service
    container_name: rr-places-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL_RENDER}

  reviews-api:
    build: ./reviews-service
    container_name: rr-reviews-api
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL_RENDER}
      PLACES_API_URL: ${PLACES_API_URL}

  recommendation-api:
    build: ./recommendation-service
    container_name: rr-recommendation-api
    environment:
      DATABASE_URL: ${DATABASE_URL_RENDER}
    ports:
      - "8002:8000"

  frontend:
    build: ./frontend
    container_name: rr-frontend
    ports:
      - "3000:3000"
    depends_on:
      - places-api
      - reviews-api
    # A diretiva 'environment' foi removida, o Vite lerá do seu próprio .env